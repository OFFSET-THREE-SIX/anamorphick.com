# /etc/nginx/sites-available/cms.anamorphick.com
# Reverse-proxy TLS in front of headless Ghost. After placing this file:
#   ln -s /etc/nginx/sites-available/cms.anamorphick.com /etc/nginx/sites-enabled/
#   certbot --nginx -d cms.anamorphick.com     # issues + wires up the certificate
#   nginx -t && systemctl reload nginx
# NOTE: keep cms.anamorphick.com as DNS-only (grey cloud) in Cloudflare until certbot succeeds.

server {
    listen 80;
    server_name cms.anamorphick.com;

    server_tokens off;          # hide nginx version from responses

    client_max_body_size 50m;   # allow large photo uploads

    # --- Security headers ---
    add_header X-Frame-Options        "SAMEORIGIN"       always;
    add_header X-Content-Type-Options "nosniff"           always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy     "camera=(), microphone=(), geolocation=()" always;
    # HSTS — uncomment after certbot is wired up and TLS is confirmed working:
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    location / {
        proxy_pass http://127.0.0.1:2368;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Block direct access to Ghost's built-in API endpoints that should only
    # be reached via the admin panel or authenticated integrations.
    location ~* ^/ghost/api/v[0-9]+/admin/ {
        allow 127.0.0.1;
        deny  all;
    }
}
